<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--navy);color:var(--fg-1);font-family:var(--font-body);min-height:100vh}
  a{color:inherit}

  /* HERO */
  .hero{padding:80px 48px 64px;border-bottom:1px solid var(--navy-4);position:relative;overflow:hidden}
  .hero::before{content:'';position:absolute;top:-120px;right:-80px;width:420px;height:420px;border-radius:50%;
    background:radial-gradient(circle,rgba(232,176,75,.10) 0%,transparent 70%);pointer-events:none}
  /* cursor spotlight — driven by --mx / --my custom properties on .hero */
  .hero::after{content:'';position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .4s;
    background:radial-gradient(240px circle at var(--mx,50%) var(--my,50%),rgba(232,176,75,.10),transparent 60%)}
  .hero:hover::after{opacity:1}

  /* project image cycle */
  .img-stack{position:absolute;inset:0;overflow:hidden;border-radius:inherit}
  .img-stack img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .6s ease}
  .img-stack img.on{opacity:.55}
  .project-card.has-images .desc-wrap{position:relative;z-index:1}

  /* keyboard focus ring */
  .project-card.kb-focus{outline:1px solid var(--gold-line);outline-offset:3px}

  /* TL;DR floating button + sheet */
  .tldr-fab{position:fixed;right:24px;bottom:24px;background:var(--gold);color:var(--navy);
    font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;padding:10px 16px;
    border:0;border-radius:var(--r-sharp);cursor:pointer;font-weight:500;
    box-shadow:0 6px 24px rgba(0,0,0,.4);z-index:40;transition:transform .2s}
  .tldr-fab:hover{transform:translateY(-2px);background:var(--gold-2)}
  .tldr-sheet{position:fixed;right:24px;bottom:78px;width:340px;background:var(--navy-2);
    border:1px solid var(--navy-4);border-radius:var(--r-card);padding:24px;z-index:40;
    transform:translateY(8px);opacity:0;pointer-events:none;transition:all .25s}
  .tldr-sheet.open{transform:translateY(0);opacity:1;pointer-events:auto}
  .tldr-sheet h4{font-family:var(--font-display);font-size:20px;color:var(--fg-1);margin-bottom:4px}
  .tldr-sheet h4 em{color:var(--gold);font-style:italic}

  .tldr-sheet li{font-size:13px;color:var(--fg-muted);line-height:1.55;padding-left:16px;position:relative}
  .tldr-sheet li::before{content:'';position:absolute;left:0;top:8px;width:6px;height:1px;background:var(--gold)}
  .tldr-sheet li b{color:var(--fg-1);font-weight:500}
  .tldr-sheet .proof{color:var(--ember)}
  /* tiny constellation — five dots in a low-contrast ornament */

  .stars i{position:absolute;width:3px;height:3px;border-radius:50%;background:var(--gold)}

  .stars i:nth-child(2){left:38%;top:8%;background:var(--moss)}
  .stars i:nth-child(3){left:62%;top:42%}

  .aside{font-family:var(--font-display);font-style:italic;font-size:15px;color:var(--moss);max-width:560px;line-height:1.5;margin-bottom:32px}

  .contact-text em{color:var(--gold);font-style:italic}
  .contact-text .moss{color:var(--moss);font-style:italic}

  .overlay.open{display:flex}

  .modal h3{font-family:var(--font-display);font-size:26px;color:var(--fg-1);margin-bottom:8px}
  .modal h3 em{color:var(--gold);font-style:italic}
  .modal p{font-size:13px;color:var(--fg-muted);line-height:1.7;margin-bottom:18px}
  .modal-close{position:absolute;top:12px;right:14px;background:none;border:0;color:var(--fg-muted);

function StatCounter({ from, to, suffix }) {
  const [n, setN] = useState(from);
  const ref = useRef(null);
  const fired = useRef(false);
  useEffect(() => {
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting && !fired.current) {
          fired.current = true;
          const start = performance.now();
          const dur = 900;
          const tick = now => {
            const t = Math.min(1, (now - start) / dur);
            const eased = 1 - Math.pow(1 - t, 3);
            setN(Math.round(from + (to - from) * eased));
            if (t < 1) requestAnimationFrame(tick);
          };
          requestAnimationFrame(tick);
        }
      });
    }, { threshold: 0.5 });
    if (ref.current) io.observe(ref.current);
    return () => io.disconnect();
  }, []);
  return <span ref={ref}>{n}{suffix}</span>;
}

function ProjectCard({ num, title, desc, stack, type, repo, repoLabel, accent, images, kbFocus }) {

  const accentColor = isMoss ? 'var(--moss)' : 'var(--gold)';
  const accentLine = isMoss ? 'var(--moss-line)' : 'var(--gold-line)';

    <div
      className={`project-card ${kbFocus ? 'kb-focus' : ''} ${images ? 'has-images' : ''}`}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => { setHover(false); setImgIdx(0); }}

        background:'var(--navy-2)',
        border:`1px solid ${hover ? accentLine : 'var(--navy-4)'}`,
        borderRadius:'var(--r-card)', padding:28, position:'relative', overflow:'hidden',

        <div className="meta">For recruiters in a hurry</div>
        <ul>
          <li className="proof"><b>Proof:</b> grew dept. share 9% → 16% in 3 months at H&amp;M</li>
          <li><b>Data analyst</b> — SQL, BigQuery, Python, Power BI</li>
          <li><b>BSc Computer Information Systems</b>, UFV · Dean's List 2025</li>
          <li><b>Available now</b> · open to relocation</li>
        </ul>
      </div>
    </>
  );
}

function App(){
  const [contactOpen, setContactOpen] = useState(false);
  const [focusIdx, setFocusIdx] = useState(-1);
  const cardsRef = useRef([]);
  useEffect(() => {
    const onKey = e => {
      if (e.target.matches('input,textarea')) return;
      if (e.key === 'j' || e.key === 'J') {
        e.preventDefault();
        setFocusIdx(i => {
          const next = Math.min(PROJECTS.length - 1, i + 1);
          cardsRef.current[next]?.scrollIntoView({ behavior: 'smooth', block: 'center' });
          return next;
        });
      } else if (e.key === 'k' || e.key === 'K') {
        e.preventDefault();
        setFocusIdx(i => {
          const next = Math.max(0, i - 1);
          cardsRef.current[next]?.scrollIntoView({ behavior: 'smooth', block: 'center' });
          return next;
        });
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);
  return (
    <div data-screen-label="01 Portfolio Home">
      <Hero onContact={()=>setContactOpen(true)} />

      <div className="section">
        <div className="section-label">Skills</div>
        <div className="skills-grid">
          {SKILLS.map(s => <SkillGroup key={s.title} {...s} />)}
        </div>
      </div>

      <div className="section" style={{paddingTop:0}}>
        <div className="section-label">A number I am proud of</div>
        <div className="stat">
          <div className="num">{
            // Animated 9 → 16
          }<StatCounter from={9} to={9} />{' → '}<em><StatCounter from={9} to={16} suffix="%" /></em></div>
          <div className="copy">
            <b>Department contribution to total store sales</b>, in three months. Tracked weekly, decided on the data, not the vibes.
          </div>
        </div>
        <blockquote className="pullquote">
          Data analyst <span className="moss">and</span> builder. I work at the intersection of <span className="gold">SQL, Python, and real business problems</span> — and, on the side, I model in Blender for a fantasy novel I am writing.
          <cite className="pullquote-cite">— how I'd describe myself, today</cite>
        </blockquote>
      </div>

      <div className="section" style={{paddingTop:0}}>
        <div className="section-label">Projects</div>
        <div className="projects-grid">
          {PROJECTS.map((p, i) => (
            <div key={p.num} ref={el => cardsRef.current[i] = el}>
              <ProjectCard {...p} kbFocus={focusIdx === i} />
            </div>
          ))}
        </div>
      </div>

      <div className="section" style={{paddingTop:0}}>
        <div className="section-label">Experience &amp; Education</div>
        <div className="exp-list">
          {EXPERIENCE.map((e,i)=> <ExperienceItem key={i} {...e} />)}
        </div>
      </div>

      <div className="contact-bar">
        <div className="contact-text">Let's work<br/><em>together</em><span className="moss">.</span></div>
        <div className="links">
          <a className="link primary" href="#" onClick={e=>{e.preventDefault();setContactOpen(true);}}>shefreenkaur@gmail.com</a>
          <a className="link" href="https://linkedin.com/in/shefreenkaur" target="_blank" rel="noreferrer">LinkedIn</a>
          <a className="link moss" href="https://github.com/shefreenkaur" target="_blank" rel="noreferrer">GitHub</a>
        </div>
      </div>

      <ContactModal open={contactOpen} onClose={()=>setContactOpen(false)} />
      <TldrFab />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
